<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUTUREPATH AI - Modern Career DNA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- ดึง Icon จาก Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Kanit', sans-serif; background: #f0f2f5; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .hero-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e40af 100%); }
        
        /* สไตล์สำหรับการพิมพ์ (Print) */
        @media print {
            body { background: white; padding: 0; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .glass { background: white !important; border: none !important; box-shadow: none !important; }
            .hero-gradient { background: #1e40af !important; color: white !important; -webkit-print-color-adjust: exact; }
            #resultArea { display: block !important; width: 100%; }
        }
    </style>
</head>
<body class="antialiased">

    <div class="max-w-4xl mx-auto my-8 bg-white shadow-2xl rounded-3xl overflow-hidden glass border border-white/20">
        <!-- Header -->
        <div class="hero-gradient text-white p-12 text-center relative overflow-hidden">
            <div class="relative z-10">
                <h1 class="text-5xl font-black mb-3 tracking-tight">🧠 FUTUREPATH AI</h1>
                <p class="text-blue-200 text-lg font-light">The Future of Career DNA Analysis</p>
            </div>
            <!-- ตกแต่งวงกลมพื้นหลัง -->
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-blue-500 rounded-full opacity-20"></div>
        </div>

        <div class="p-8 md:p-12">
            <!-- หน้าแบบประเมิน -->
            <form id="assessmentForm" class="space-y-10">
                <div id="questionsContainer" class="space-y-8"></div>
                <div class="text-center pt-8">
                    <button type="button" onclick="calculateDNA()" class="bg-blue-600 hover:bg-blue-700 text-white px-16 py-5 rounded-2xl text-xl font-bold transition-all hover:shadow-2xl active:scale-95">
                        <i class="fa-solid fa-wand-magic-sparkles mr-2"></i> วิเคราะห์ผลลัพธ์
                    </button>
                </div>
            </form>

            <!-- หน้าสรุปผลลัพธ์ (Modern Dashboard) -->
            <div id="resultArea" class="hidden space-y-10">
                <div class="flex justify-between items-center no-print">
                    <h2 class="text-3xl font-bold text-slate-800">📊 ผลการวิเคราะห์รายด้าน</h2>
                    <button onclick="window.print()" class="bg-slate-800 text-white px-5 py-2 rounded-lg hover:bg-slate-700 transition">
                        <i class="fa-solid fa-print mr-2"></i> พิมพ์ผลสรุป
                    </button>
                </div>

                <!-- Grid คะแนน -->
                <div id="percentGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>

                <!-- Career DNA Highlight Card -->
                <div class="bg-slate-900 text-white p-10 rounded-[2rem] shadow-2xl relative overflow-hidden">
                    <div class="relative z-10 text-center">
                        <i class="fa-solid fa-award text-5xl text-yellow-400 mb-4"></i>
                        <p class="text-blue-300 uppercase tracking-[0.3em] text-sm mb-2">Career DNA Result</p>
                        <h3 id="careerTitle" class="text-5xl font-black mb-8 text-transparent bg-clip-text bg-gradient-to-r from-white to-blue-300"></h3>
                        
                        <div class="text-left space-y-4 max-w-lg mx-auto" id="courseContainer"></div>
                    </div>
                    <!-- วงกลมประดับข้างหลัง -->
                    <div class="absolute bottom-0 left-0 w-32 h-32 bg-blue-600 rounded-full blur-[80px] opacity-30"></div>
                </div>

                <div class="text-center no-print pt-6">
                    <button onclick="location.reload()" class="text-slate-500 hover:text-blue-600 transition">
                        <i class="fa-solid fa-rotate-left mr-2"></i> เริ่มทำใหม่อีกครั้ง
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const categories = [
            { id: "tech", icon: "fa-laptop-code", name: "Technology", questions: ["สนใจเรียนรู้แอปใหม่ๆ", "แก้ปัญหาดิจิทัลเบื้องต้นได้", "ชอบทดลองใช้ AI", "ค้นหาข้อมูลออนไลน์เก่ง", "สนใจงานสายดิจิทัล", "เรียนรู้โปรแกรมได้เอง", "สร้างผลงานผ่านเทคโนโลยี", "ติดตามเทรนด์เทคโนโลยี"] },
            { id: "creative", icon: "fa-palette", name: "Creativity", questions: ["ชอบคิดไอเดียใหม่ๆ", "สนุกกับการออกแบบ", "แก้ปัญหาแบบแปลกใหม่", "ชอบทดลองสิ่งใหม่ๆ", "เชื่อมโยงความคิดเก่ง", "ชอบงานใช้จินตนาการ", "ชอบสร้างคอนเทนต์", "กล้าเสนอความเห็น"] },
            { id: "leader", icon: "fa-users-gear", name: "Leadership", questions: ["วางแผนงานเก่ง", "กล้าตัดสินใจ", "ทำงานกับผู้อื่นได้ดี", "มักได้เป็นหัวหน้า", "กระตุ้นเพื่อนร่วมทีมได้", "มีความรับผิดชอบ", "บริหารเวลาดี", "แก้ปัญหาเฉพาะหน้าได้"] },
            { id: "comm", icon: "fa-comments", name: "Communication", questions: ["อธิบายความคิดชัดเจน", "กล้าพูดในที่สาธารณะ", "ฟังความเห็นผู้อื่น", "ทำงานกับคนหลากหลาย", "ใช้โซเชียลสื่อสารเก่ง", "โน้มน้าวใจคนได้", "นำเสนอผลงานมั่นใจ", "ชอบพบปะผู้คน"] },
            { id: "analyt", icon: "fa-magnifying-glass-chart", name: "Analytical", questions: ["วิเคราะห์เป็นขั้นตอน", "ใช้เหตุผลตัดสินใจ", "ชอบหาสาเหตุของปัญหา", "เปรียบเทียบข้อมูลก่อน", "ชอบโจทย์ท้าทายความคิด", "วิเคราะห์กราฟ/ข้อมูล", "ชอบแก้ปัญหาซับซ้อน", "วางแผนแก้ปัญหาดี"] },
            { id: "entre", icon: "fa-briefcase", name: "Entrepreneur", questions: ["สนใจธุรกิจ/การขาย", "ชอบคิดวิธีสร้างรายได้", "กล้าลองเสี่ยงทำสิ่งใหม่", "มองเห็นโอกาสธุรกิจ", "ชอบวางแผนการเงิน", "สนใจการตลาด", "บริหารทรัพยากรเป็น", "อยากมีธุรกิจส่วนตัว"] }
        ];

        const courseData = {
            "Tech Strategist": ["สาขาวิชาวิทยาการคอมพิวเตอร์ คณะวิทยาศาสตร์และเทคโนโลยี", "สาขาวิชาวิศวกรรมคอมพิวเตอร์ คณะวิศวกรรมศาสตร์", "สาขาวิชาเทคโนโลยีสารสนเทศ"],
            "Creative Innovator": ["สาขาวิชาการออกแบบสื่อสาร คณะนิเทศศาสตร์", "สาขาวิชาสถาปัตยกรรมศาสตร์", "สาขาวิชานวัตกรรมการออกแบบสื่อ"],
            "Future Entrepreneur": ["สาขาวิชาการประกอบการดิจิทัล คณะบริหารธุรกิจ", "สาขาวิชาการตลาด คณะพาณิชยศาสตร์และการบัญชี"],
            "Data-Driven Leader": ["สาขาวิชาวิทยาการข้อมูล คณะวิทยาศาสตร์", "สาขาวิชาวิศวกรรมการจัดการ คณะวิศวกรรมศาสตร์"],
            "Digital Creator": ["สาขาวิชาเทคโนโลยีมัลติมีเดีย คณะเทคโนโลยีสื่อสารมวลชน", "สาขาวิชาภาพยนตร์และสื่อดิจิทัล"],
            "Multi-Talented Explorer": ["สาขาวิชาบูรณาการศาสตร์ คณะศิลปศาสตร์", "สาขาวิชานวัตกรรมสังคม"]
        };

        const dnaMap = {
            "tech+analyt": "Tech Strategist", "analyt+tech": "Tech Strategist",
            "creative+comm": "Creative Innovator", "comm+creative": "Creative Innovator",
            "leader+entre": "Future Entrepreneur", "entre+leader": "Future Entrepreneur",
            "analyt+leader": "Data-Driven Leader", "leader+analyt": "Data-Driven Leader",
            "creative+tech": "Digital Creator", "tech+creative": "Digital Creator"
        };

        // Render Questions
        const qContainer = document.getElementById('questionsContainer');
        categories.forEach(cat => {
            let html = `<div class="bg-white rounded-3xl p-8 border border-slate-100 shadow-sm">
                        <h3 class="text-2xl font-bold text-slate-800 mb-8 flex items-center">
                            <i class="fa-solid ${cat.icon} mr-4 text-blue-600 bg-blue-50 p-3 rounded-2xl"></i> ${cat.name}
                        </h3>`;
            cat.questions.forEach((q, i) => {
                html += `
                    <div class="mb-8 last:mb-0">
                        <p class="text-slate-600 mb-4 font-medium">${i + 1}. ${q}</p>
                        <div class="grid grid-cols-5 gap-2 md:gap-4 max-w-lg">
                            ${[1, 2, 3, 4, 5].map(v => `
                                <label class="cursor-pointer group">
                                    <input type="radio" name="${cat.id}_${i}" value="${v}" required class="peer hidden">
                                    <div class="py-3 rounded-xl border-2 border-slate-100 text-center text-slate-400 font-bold peer-checked:bg-blue-600 peer-checked:text-white peer-checked:border-blue-600 transition-all">
                                        ${v}
                                    </div>
                                </label>
                            `).join('')}
                        </div>
                    </div>`;
            });
            html += `</div>`;
            qContainer.innerHTML += html;
        });

        function calculateDNA() {
            const scores = {};
            let valid = true;
            categories.forEach(cat => {
                let sum = 0;
                for(let i=0; i<8; i++){
                    const checked = document.querySelector(`input[name="${cat.id}_${i}"]:checked`);
                    if(checked) sum += parseInt(checked.value);
                    else valid = false;
                }
                scores[cat.id] = { name: cat.name, val: sum, icon: cat.icon };
            });

            if(!valid) return alert("กรุณาทำแบบประเมินให้ครบทุกข้อครับ");
            
            showDashboard(scores);
        }

        function showDashboard(scores) {
            document.getElementById('assessmentForm').classList.add('hidden');
            document.getElementById('resultArea').classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'});

            const grid = document.getElementById('percentGrid');
            grid.innerHTML = '';
            Object.values(scores).forEach(s => {
                const percent = ((s.val / 40) * 100).toFixed(1);
                grid.innerHTML += `
                    <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-center space-x-6">
                        <div class="bg-blue-50 p-4 rounded-xl text-blue-600 text-2xl"><i class="fa-solid ${s.icon}"></i></div>
                        <div class="flex-1">
                            <div class="flex justify-between mb-2">
                                <span class="font-bold text-slate-700">${s.name}</span>
                                <span class="text-blue-600 font-black">${percent}%</span>
                            </div>
                            <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                <div class="bg-blue-600 h-full rounded-full" style="width: ${percent}%"></div>
                            </div>
                        </div>
                    </div>`;
            });

            const sorted = Object.keys(scores).sort((a,b) => scores[b].val - scores[a].val);
            const dnaKey = `${sorted[0]}+${sorted[1]}`;
            const title = dnaMap[dnaKey] || "Multi-Talented Explorer";
            
            document.getElementById('careerTitle').innerText = title;
            const courses = courseData[title] || courseData["Multi-Talented Explorer"];
            document.getElementById('courseContainer').innerHTML = courses.map(c => `
                <div class="bg-white/10 backdrop-blur-sm p-4 rounded-xl border border-white/20 flex items-center">
                    <i class="fa-solid fa-graduation-cap mr-4 text-blue-300"></i>
                    <span class="text-sm font-light">${c}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
